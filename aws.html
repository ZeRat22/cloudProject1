<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Management Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aws-body">

    <header class="aws-header">
        <div class="aws-logo">
            <i data-lucide="box"></i>
            <span>aws</span>
        </div>
        <div class="aws-search">
            <i data-lucide="search" size="18"></i>
            <span>Search for services, features...</span>
        </div>
        <div class="aws-user-nav">
            <span style="margin-right: 1.5rem;">[us-east-1]</span>
            <i data-lucide="user"></i>
        </div>
    </header>

    <main class="aws-dashboard">
        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700;">Console Home</h1>
        </div>

        <div class="aws-grid">
            <!-- Recently Visited -->
            <div class="aws-card" style="grid-column: span 2;">
                <h3>Recently visited</h3>
                <div class="aws-service-list">
                    <div class="aws-service-item"><i data-lucide="server"></i> EC2</div>
                    <div class="aws-service-item"><i data-lucide="database"></i> RDS</div>
                    <div class="aws-service-item"><i data-lucide="hard-drive"></i> S3</div>
                    <div class="aws-service-item"><i data-lucide="lambda"></i> Lambda</div>
                    <div class="aws-service-item"><i data-lucide="shield"></i> IAM</div>
                    <div class="aws-service-item"><i data-lucide="cloud"></i> VPC</div>
                </div>
            </div>

            <!-- AWS Health -->
            <div class="aws-card">
                <h3>AWS Health</h3>
                <p style="color: #687078; font-size: 0.9rem;">Your infrastructure is healthy.</p>
                <div style="margin-top: 1rem; color: #0073bb; font-size: 0.9rem; font-weight: 500;">
                    View all events <i data-lucide="external-link" size="14" style="display: inline; vertical-align: middle;"></i>
                </div>
            </div>

            <!-- Cost and Usage -->
            <div class="aws-card">
                <h3>Cost and usage</h3>
                <p style="color: #687078; font-size: 0.85rem;">Last month's cost</p>
                <p style="font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0;">$142.50</p>
                <div style="color: #0073bb; font-size: 0.9rem; font-weight: 500;">
                    View billing dashboard
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <a href="index.html" style="color: #0073bb; font-weight: 500;">&larr; Return to CloudNexus</a>
        </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>
